<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>潜伏猜人游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 {
            text-align: center;
            color: #c41e3a;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .chances {
            text-align: center;
            color: #c41e3a;
            font-size: 16px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .rules {
            background: #fff3cd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #856404;
        }
        .rules li {
            margin: 5px 0;
            margin-left: 20px;
        }
        #game-area {
            display: none;
        }
        .chat-box {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
            min-height: 300px;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }
        .message {
            margin: 10px 0;
            padding: 12px 16px;
            border-radius: 10px;
            max-width: 80%;
            line-height: 1.5;
        }
        .message.bot {
            background: #e8f5e9;
            margin-right: auto;
        }
        .message.user {
            background: #c41e3a;
            color: white;
            margin-left: auto;
        }
        .message.system {
            background: #fff3cd;
            color: #856404;
            text-align: center;
            max-width: 100%;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #c41e3a;
        }
        button {
            padding: 12px 30px;
            background: #c41e3a;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        button:hover {
            background: #a01830;
        }
        button:disabled {
            background: #999;
            cursor: not-allowed;
        }
        .start-btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            margin-top: 20px;
        }
        #result-area {
            display: none;
            text-align: center;
        }
        #result-area h2 {
            color: #c41e3a;
            margin-bottom: 20px;
        }
        .character-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #ddd;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎭 潜伏猜人游戏</h1>
        <p class="subtitle">我是《潜伏》里的谁？</p>
        
        <div class="rules">
            <strong>游戏规则：</strong>
            <ul>
                <li>我扮演《潜伏》中的一个角色</li>
                <li>你问我问题，我只能回答"是"或"不是"</li>
                <li>每句话不超过15字</li>
                <li>共10次提问机会</li>
                <li>猜对了就告诉你我是谁</li>
                <li>说"游戏结束"就结束</li>
            </ul>
        </div>

        <button class="start-btn" onclick="startGame()">开始游戏</button>

        <div id="game-area">
            <div class="chances" id="chances">还剩 10 次机会</div>
            <div class="chat-box" id="chat-box"></div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="问我问题..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()" id="send-btn">发送</button>
            </div>
        </div>

        <div id="result-area">
            <div class="character-img" id="character-emoji">🎭</div>
            <h2 id="character-name"></h2>
            <p id="character-desc"></p>
            <button class="start-btn" onclick="restartGame()">再来一局</button>
        </div>
    </div>

    <script>
        const API_URL = '/api/chat';

        // 潜伏角色详细背景
        const characters = [
            {
                name: '余则成',
                emoji: '👨‍💼',
                desc: '军统天津站副站长，实际是中共地下党员"深海"',
                faction: '中共',
                background: '你曾就读于燕京大学，与左蓝是恋人。刺杀叛徒李海丰后加入军统，后来信仰共产主义，成为潜伏在军统的地下党员。与翠平假扮夫妻多年，最终产生真感情。天津解放前被吴站长裹挟去台湾，继续潜伏。',
                personality: '沉稳内敛、足智多谋、忠诚坚定'
            },
            {
                name: '翠平',
                emoji: '👩',
                desc: '余则成的假妻子，中共女游击队员',
                faction: '中共',
                background: '你原名陈桃花，是冀中根据地的女游击队长。因为文化水平低，与受过高等教育的余则成在一起经常发生摩擦。但多年假夫妻下来，你们产生了真感情，最后秘密结婚。天津解放前被迫与余则成分离。',
                personality: '直爽泼辣、敢爱敢恨、坚韧不屈'
            },
            {
                name: '左蓝',
                emoji: '👩‍💼',
                desc: '余则成女友，中共地下党员，牺牲了',
                faction: '中共',
                background: '你是余则成的大学同学和恋人，后来也是中共地下党员。在执行任务时被马奎发现，在激战中不幸中弹牺牲。你的死让余则成悲痛欲绝，但更加坚定了他潜伏的决心。',
                personality: '知性优雅、勇敢坚定、温柔深情'
            },
            {
                name: '吴敬中',
                emoji: '👮',
                desc: '天津站站长，老谋深算的政客',
                faction: '国军',
                background: '你是军统（保密局）天津站站长，深谙官场之道。你贪污腐败、敛财自肥，对政治斗争早已厌倦，只想捞够钱远走高飞。你重用余则成，是因为他办事得力又不威胁你的地位。',
                personality: '老奸巨滑、贪财怕死、深谙世故'
            },
            {
                name: '李涯',
                emoji: '👨‍💻',
                desc: '军统（保密局）行动队队长',
                faction: '国军',
                background: '你从延安投诚过来，一心想证明自己的忠诚。你执着于抓"内鬼"，多次怀疑余则成但始终没有证据。你誓言"效忠党国"，最后被廖三民摔倒楼下牺牲。',
                personality: '执着果敢、一根筋、忠于信仰'
            },
            {
                name: '陆桥山',
                emoji: '👨‍⚖️',
                desc: '军统情报处主任',
                faction: '国军',
                background: '你是情报处主任，后来被调往南京。你与李涯争权夺利，互相拆台。天津站内部斗得你死我活。后来离开天津站去南京任职。',
                personality: '阴险狡诈、善于钻营、离心离德'
            },
            {
                name: '马奎',
                emoji: '👮‍♂️',
                desc: '军统行动队队长',
                faction: '国军',
                background: '你是行动队队长，曾带人搜捕共产党。后来被证实是"雪山"（共产党卧底），在逃跑时被击毙。你曾怀疑余则成是共产党，但最终没有确凿证据。',
                personality: '鲁莽冲动、疑神疑鬼'
            },
            {
                name: '穆晚秋',
                emoji: '👩‍🎓',
                desc: '大家闺秀，后加入共产党',
                faction: '中共',
                background: '你是穆连成的侄女，大家闺秀出身。曾被谢若林利用来刺激余则成。后来看清谢若林的真面目，对余则成产生真感情。最后加入共产党，与秋掌柜一起从事地下工作。',
                personality: '外柔内刚、敢爱敢恨、知书达理'
            },
            {
                name: '谢若林',
                emoji: '🕴️',
                desc: '黑市商人，倒卖情报',
                faction: '中立',
                background: '你是典型的投机商贩，在国共两党之间倒卖情报赚钱。你说过"两根金条放在一起，你分得清哪根是高尚的，哪根是龌龊的吗？"。最后被李涯杀掉。',
                personality: '唯利是图、精明世故、及时行乐'
            },
            {
                name: '廖三民',
                emoji: '👨‍🔧',
                desc: '天津站副官，共产党员',
                faction: '中共',
                background: '你是天津站副官，真实身份是中共地下党员。暗中配合余则成传递情报。最后为了保护余则成，与李涯同归于尽，摔下楼去。',
                personality: '沉稳内敛、忠贞不屈、舍生取义'
            },
            {
                name: '秋客栈',
                emoji: '👴',
                desc: '中共地下联络员',
                faction: '中共',
                background: '你是中共在天津的地下联络员，负责与余则成、廖三民传递情报。最后被保密局发现并杀害。',
                personality: '慈祥沉稳、经验丰富、忠诚坚定'
            },
            {
                name: '周亚夫',
                emoji: '👨‍🎤',
                desc: '中共地下党员',
                faction: '中共',
                background: '你是中共在天津的地下交通员，负责传递情报。与秋客栈单线联系。最后为保护组织英勇牺牲。',
                personality: '机智勇敢、沉稳冷静'
            }
        ];

        let currentCharacter = null;
        let gameOver = false;
        let chances = 10;

        function startGame() {
            currentCharacter = characters[Math.floor(Math.random() * characters.length)];
            gameOver = false;
            chances = 10;
            
            document.querySelector('.start-btn').style.display = 'none';
            document.querySelector('.rules').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('chances').textContent = `还剩 ${chances} 次机会`;
            
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = `
                <div class="message system">游戏开始！我准备好了，你问吧。（共${chances}次机会）</div>
            `;
        }

        async function sendMessage() {
            if (gameOver) return;
            if (chances <= 0) {
                endGame(false, '次数用尽！');
                return;
            }
            
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message) return;

            chances--;
            document.getElementById('chances').textContent = `还剩 ${chances} 次机会`;

            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<div class="message user">${message}</div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = true;
            chatBox.innerHTML += '<div class="loading">思考中...</div>';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        messages: [
                            {
                                role: 'system',
                                content: `你正在扮演《潜伏》电视剧中的${currentCharacter.name}。

【角色背景】
${currentCharacter.background}

【角色性格】
${currentCharacter.personality}

【基本信息】
- 姓名：${currentCharacter.name}
- 阵营：${currentCharacter.faction}

【重要规则】
1. 用户通过提问来猜测你的身份
2. 只能回答"是"或"不是"，永远不能说出自己的名字！
3. 按角色性格和背景回答，不能撒谎，不能编造事实
4. 每句话不超过15个字
5. 如果用户说"游戏结束"，告诉用户你是谁
6. 10次机会用完还没猜出来时，告诉用户你的名字`
                            },
                            {
                                role: 'user',
                                content: message
                            }
                        ]
                    })
                });

                const data = await response.json();
                chatBox.removeChild(chatBox.lastChild);
                
                let reply = data.choices?.[0]?.message?.content || '这个问题我不能回答。';
                
                // 检查是否猜对了
                const isGuessing = message.includes(currentCharacter.name) || 
                    message === '你是余则成吗' || message === '你是翠平吗' || 
                    message === '你是吴敬中吗' || message === '你是李涯吗' || 
                    message === '你是陆桥山吗' || message === '你是廖三民吗' || 
                    message === '你是穆晚秋吗' || message === '你是谢若林吗' ||
                    message === '你是左蓝吗' || message === '你是马奎吗' ||
                    message === '你是秋客栈吗' || message === '你是周亚夫吗';
                
                if (isGuessing) {
                    if (reply.includes('是') || reply.includes('对') || reply.includes('没错')) {
                        endGame(true);
                        return;
                    }
                }
                
                // 检查是否说游戏结束
                if (message === '游戏结束' || message.includes('游戏结束')) {
                    endGame(false);
                    return;
                }
                
                // 检查次数是否用尽
                if (chances <= 0) {
                    endGame(false, '次数用尽！');
                    return;
                }
                
                // 限制15字
                if (reply.length > 15) {
                    reply = reply.substring(0, 15);
                }
                
                chatBox.innerHTML += `<div class="message bot">${reply}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) {
                chatBox.removeChild(chatBox.lastChild);
                chatBox.innerHTML += `<div class="message bot">出错了，请再说一次。</div>`;
                chances++;
                document.getElementById('chances').textContent = `还剩 ${chances} 次机会`;
            }

            sendBtn.disabled = false;
            input.focus();
        }

        function endGame(guessed, extraMsg = '') {
            gameOver = true;
            const chatBox = document.getElementById('chat-box');
            let msg = guessed ? '恭喜你猜对了！' : '游戏结束！';
            if (extraMsg) msg = extraMsg;
            chatBox.innerHTML += `<div class="message system">${msg} 我是${currentCharacter.name}。</div>`;
            
            setTimeout(() => {
                document.getElementById('game-area').style.display = 'none';
                document.getElementById('result-area').style.display = 'block';
                document.getElementById('character-emoji').textContent = currentCharacter.emoji;
                document.getElementById('character-name').textContent = currentCharacter.name;
                document.getElementById('character-desc').textContent = currentCharacter.desc + '（' + currentCharacter.faction + '）';
            }, 1500);
        }

        function restartGame() {
            document.getElementById('result-area').style.display = 'none';
            document.querySelector('.start-btn').style.display = 'block';
            document.querySelector('.rules').style.display = 'block';
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
